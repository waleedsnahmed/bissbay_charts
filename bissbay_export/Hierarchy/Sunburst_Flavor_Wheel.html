// Set themes
// https://www.bissbay.com/docs/v5/concepts/themes/
root.setThemes([
  am5themes_Animated.new(root)
]);


var container = root.container.children.push(
  am5.ZoomableContainer.new(root, {
    width: am5.p100,
    height: am5.p100,
    wheelable: true,
    pinchZoom: true
  })
);

var zoomTools = container.children.push(am5.ZoomTools.new(root, {
  target: container
}));

// Add title
var title = container.contents.children.push(am5.Label.new(root, {
  text: "COFFEE\n[#63bdc5]AROMA[/]\n[#63bdc5]WHEEL[/]",
  textAlign: "center",
  x: am5.p50,
  y: am5.p50,
  centerX: am5.p50,
  centerY: am5.p50,
  fontSize: 25,
  fontWeight: "500",
  fill: am5.color(0x385d63)

  text: "Inspired by\n[bold]CoffeeMind",
  x: am5.p100,
  y: 0,
  centerX: am5.p100,
  centerY: 0,
  fontSize: 15,
  fill: am5.color(0x385d63),
  cursorOverStyle: "pointer",
  background: am5.Rectangle.new(root, {
    fill: am5.color(0x000000),
    fillOpacity: 0
  })
}));

credits.events.on("click", function() {
  window.open("https://coffee-mind.com/product/coffeemind-aroma-wheel/");
});


// Create series
// https://www.bissbay.com/docs/v5/charts/hierarchy/#Adding
var series = container.contents.children.push(am5hierarchy.Sunburst.new(root, {
  singleBranchOnly: true,
  downDepth: 2,
  initialDepth: 2,
  topDepth: 1,
  innerRadius: 100,
  valueField: "value",
  categoryField: "name",
  childDataField: "children"
}));

series.nodes.template.setAll({
  tooltipText: "{category}"
});

series.slices.template.setAll({
  templateField: "nodeSettings"
});

series.labels.template.setAll({
  paddingLeft: 10,
  paddingRight: 10,
  paddingTop: 5,
  paddingBottom: 5,
  baseRadius: am5.p100,
