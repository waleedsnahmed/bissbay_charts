<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Map with Patterns - Bissbay Export</title>
</head>
<body>
<!-- Styles -->
<style>
#chartdiv {
  width: 100%;
  height: 500px
}
</style>

<!-- Resources -->
<script src="../lib/5/index.js"></script>
<script src="../lib/5/map.js"></script>
<script src="../lib/5/geodata/continentsLow.js"></script>
<script src="../lib/5/themes/Animated.js"></script>

<!-- Chart code -->
<script>
am5.ready(function() {

// Create root and chart
var root = am5.Root.new("chartdiv"); 

// Set themes
root.setThemes([
  am5themes_Animated.new(root)
]);

var chart = root.container.children.push(
  am5map.MapChart.new(root, {
    panX: "rotateX",
    projection: am5map.geoNaturalEarth1()
  })
);

// Create polygon series
var polygonSeries = chart.series.push(
  am5map.MapPolygonSeries.new(root, {
    geoJSON: am5geodata_continentsLow,
    exclude: ["antarctica"]
  })
);

polygonSeries.mapPolygons.template.setAll({
  tooltipText: "{name}",
  interactive: true,
  templateField: "settings"
});

polygonSeries.mapPolygons.template.states.create("hover", {
  fill: am5.color(0x677935)
});

var colors = am5.ColorSet.new(root, {});

polygonSeries.data.setAll([{
  id: "europe",
  settings: {
    fill: colors.next(),
    fillPattern: am5.LinePattern.new(root, {
      color: am5.color(0xffffff),
      rotation: 45,
      strokeWidth: 1
    })
  }
}, {
  id: "asia",
  settings: {
    fill: colors.next(),
    fillPattern: am5.RectanglePattern.new(root, {
      color: am5.color(0xffffff),
      checkered: true
    })
  }
}, {
  id: "africa",
  settings: {
    fill: colors.next(),
    fillPattern: am5.CirclePattern.new(root, {
      color: am5.color(0xffffff),
      checkered: true
    })
  }
}, {
  id: "northAmerica",
  settings: {
    fill: colors.next(),
    fillPattern: am5.CirclePattern.new(root, {
      color: am5.color(0xffffff)
    })
  }
}, {
  id: "southAmerica",
  settings: {
    fill: colors.next(),
    fillPattern: am5.LinePattern.new(root, {
      color: am5.color(0xffffff),
      rotation: 90,
      strokeWidth: 2
    })
  }
}, {
  id: "oceania",
  settings: {
    fill: colors.next(),
    fillPattern: am5.LinePattern.new(root, {
      color: am5.color(0xffffff),
    })
  }
}])

}); // end am5.ready()
</script>

<!-- HTML -->
<div id="chartdiv"></div>
</body>
</html>
